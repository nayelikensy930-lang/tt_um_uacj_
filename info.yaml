# Tiny Tapeout project information
project:
  title:        "Custom DVD Screensaver for VGA"
  author:       "Jazmin Nayeli / Kensy Buatista"
  discord:      ""
  description:  "Bouncing DVD logo on VGA with color change on wall hits, speed control, invert, and flip options"
  language:     "Verilog"
  clock_hz:     25175000
  tiles:        "1x1"
  top_module:   "tt_um_uacj"
  source_files:
    - "hvsync_generator.v"
    - "palette.v"
    - "bitmap_rom.v"
    - "tt_um_uacj.v"

pinout:
  ui[0]: "cfg_tile"
  ui[1]: "cfg_color"
  ui[2]: "cfg_invert"
  ui[3]: "cfg_slow"
  ui[4]: "cfg_flip"
  ui[5]: "cfg_checker"
  ui[6]: "cfg_scanline"
  ui[7]: "cfg_glitch"
  uo[0]: "R1"
  uo[1]: "G1"
  uo[2]: "B1"
  uo[3]: "VSync"
  uo[4]: "R0"
  uo[5]: "G0"
  uo[6]: "B0"
  uo[7]: "HSync"
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

yaml_version: 6
